name: Verify Node Lockfile

on:
  push:
  pull_request:

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify Linux canonical lockfile
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          git diff --exit-code -- package-lock.json || {
            echo "::error::package-lock.json is not canonical for Linux/amd64. Run 'npm run check:lockfile' and commit the updated package-lock.json."
            exit 1
          }

      - name: Verify npm ci
        run: npm ci
