name: Sync Preview Supabase

on:
  workflow_run:
    workflows:
      - Verify Node Lockfile
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: preview-sync-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  sync-preview:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'dev'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SUPABASE_PRODUCTION_DB_URL: ${{ secrets.SUPABASE_PRODUCTION_DB_URL }}
      SUPABASE_PRODUCTION_URL: ${{ secrets.SUPABASE_PRODUCTION_URL }}
      SUPABASE_PRODUCTION_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_PRODUCTION_SERVICE_ROLE_KEY }}
      SUPABASE_PREVIEW_DB_URL: ${{ secrets.SUPABASE_PREVIEW_DB_URL }}
      SUPABASE_PREVIEW_URL: ${{ secrets.SUPABASE_PREVIEW_URL }}
      SUPABASE_PREVIEW_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_PREVIEW_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_PREVIEW_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_PREVIEW_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PREVIEW_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_PREVIEW_SERVICE_ROLE_KEY }}
      PREVIEW_TEST_MEMBER_USERNAME: ${{ secrets.PREVIEW_TEST_MEMBER_USERNAME }}
      PREVIEW_TEST_MEMBER_PASSWORD: ${{ secrets.PREVIEW_TEST_MEMBER_PASSWORD }}
      SUPABASE_PREVIEW_SYNC_SKIP_UNAVAILABLE: ${{ github.event_name == 'workflow_run' && 'true' || 'false' }}
    steps:
      - name: Checkout workflow run commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Validate Supabase migrations
        run: npm run validate:migrations

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check preview database connection
        id: preview-db
        run: node scripts/supabase-sync-preview.mjs --check-only

      - name: Apply preview migrations before sync
        if: steps.preview-db.outputs.preview_database_available != 'false'
        run: supabase db push --db-url "$SUPABASE_PREVIEW_DB_URL" --yes --include-all

      - name: Sync production data and storage to preview
        id: sync-preview-data
        if: steps.preview-db.outputs.preview_database_available != 'false'
        run: npm run sync:preview

      - name: Verify preview migrations after sync
        if: steps.preview-db.outputs.preview_database_available != 'false'
        run: supabase db push --db-url "$SUPABASE_PREVIEW_DB_URL" --yes --include-all
