name: Storybook and Visual Baselines

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Build, A11y, Visual Diff
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Storybook interaction and a11y tests
        run: npm run test-storybook

      - name: Install fixed Chromium
        run: npx playwright install --with-deps chromium

      - name: Compare core visual baselines
        run: npm run test:visual
