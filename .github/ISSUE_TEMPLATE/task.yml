name: Task
description: Planned work tracked through dev preview and production promotion.
title: "[Task] "
labels:
  - task
body:
  - type: markdown
    attributes:
      value: |
        작업은 `dev`에서 분기한 작업 유형별 브랜치에서 진행하고, 검증 후 `dev`로 병합합니다.
        Production 배포는 `dev` Preview 검증이 끝난 뒤 `main`으로 승격합니다.
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 작업으로 해결하려는 문제나 달성할 결과를 적습니다.
      placeholder: Footer 연락처와 지원 이메일을 정리한다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 변경 범위
      description: 수정할 화면, 파일, 동작 범위를 적습니다.
      placeholder: Footer 개인 Instagram 링크 제거, 지원 이메일 상수 변경
    validations:
      required: true
  - type: textarea
    id: branch_plan
    attributes:
      label: 브랜치 / PR 분리 계획
      description: "`dev`에서 분기할 브랜치와 각 PR의 역할을 적습니다."
      value: |
        - Base branch: dev
        - PR 1: refactor/*
        - PR 2: chore/*
        - Promotion: dev -> main after Preview verification
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 검증 계획
      description: 로컬 검증, Preview 검증, Production 승격 전 확인 항목을 적습니다.
      value: |
        - Local:
        - Preview(dev):
        - Production(main) promotion check:
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      description: Issue를 닫을 수 있는 조건을 적습니다.
      value: |
        - 모든 작업 PR이 dev에 병합됨
        - dev Preview 검증 통과
        - main 승격 완료 또는 Preview-only 승인
    validations:
      required: true
